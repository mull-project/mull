name: macOS CI
env:
  CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
on:
  push:
    branches: ["main"]
    tags: ["**"]
  pull_request:
    branches: ["main"]
jobs:
  macos:
    name: LLVM ${{ matrix.LLVM_VERSION }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bazel-cache
        with:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      - uses: ./.github/actions/detect-package-metadata
      - name: Run CI task
        run: |
          brew install bazelisk
          brew install llvm@16 llvm@17 llvm@18
      - name: Run CI task
        run: |
          bazel build //...
          bazel test //...
          bazel build mull_packages
      - name: Publish package
        if: env.CLOUDSMITH_API_KEY != null
        run: |
          # bazel run publish
      - name: Move package
        run: |
          mkdir -p /tmp/packages
          mv bazel-bin/*.zip /tmp/packages/
      - uses: ./.github/actions/attach-package
        with:
          GH_API_KEY: ${{ secrets.GITHUB_TOKEN }}

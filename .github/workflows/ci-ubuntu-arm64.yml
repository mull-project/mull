name: Ubuntu-arm64 CI
env:
  CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
on:
  push:
    branches: ["main"]
    tags: ["**"]
    # pull_request:
    #   branches: ["main"]
jobs:
  build-and-test:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        include:
          # - OS_VERSION: "20.04"
          - OS_VERSION: "22.04"
          - OS_VERSION: "24.04"
    name: Ubuntu ${{ matrix.OS_VERSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bazel-cache
        with:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      - uses: ./.github/actions/detect-package-metadata
        id: metadata
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build, test, package
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/mull-project/internal-ubuntu_${{ matrix.OS_VERSION }}-ci
          configFile: ./.devcontainer/ubuntu_${{ matrix.OS_VERSION }}/devcontainer.json
          runCmd: |
            bazel build //...
            bazel test //...
            bazel build mull_packages
      - name: Publish package
        uses: devcontainers/ci@v0.3
        if: env.CLOUDSMITH_API_KEY != null
        with:
          imageName: ghcr.io/mull-project/internal-ubuntu_${{ matrix.OS_VERSION }}-ci
          configFile: ./.devcontainer/ubuntu_${{ matrix.OS_VERSION }}/devcontainer.json
          push: never
          runCmd: |
            # bazel run publish
      - name: Move package
        run: |
          mkdir -p /tmp/packages
          sudo mv bazel-bin/*.deb /tmp/packages/
      - uses: ./.github/actions/attach-package
        with:
          GH_API_KEY: ${{ secrets.GITHUB_TOKEN }}
